# Deep Research Skill Configuration

[exploration]
# 探索深度限制
max_depth_links = 15          # 单个研究最多深入探索的链接数
max_iterations = 10           # 探索循环最大次数
max_sub_questions = 5         # 衍生子问题最大数量

[evaluation]
# 链接评估阈值
score_threshold = 0.6         # 值得探索的最低综合分数 (0-1)
min_authority = 0.3           # 最低权威性要求
min_relevance = 0.5           # 最低相关性要求

# 权重配置
relevance_weight = 0.35       # 相关性权重
authority_weight = 0.35       # 权威性权重
novelty_weight = 0.2          # 新颖性权重
depth_weight = 0.1            # 深度潜力权重

[knowledge]
# 知识收集目标
min_facts = 10                # 最少收集 facts 数
target_facts = 20             # 目标 facts 数
max_facts = 50                # 上限，防止无限收集

# 结束条件
coverage_threshold = 0.8      # 知识覆盖度阈值 (自评估)
stagnation_limit = 3          # 连续未发现新线索的最大次数

[authority_domains]
# 权威性评分映射 (0-1)
high = [".gov", ".edu", "europa.eu", "un.org", "wikipedia.org"]
medium = ["reuters.com", "bloomberg.com", "ft.com", "nytimes.com", "wsj.com", "nature.com", "ieee.org"]
low = ["medium.com", "substack.com", "blogspot.com", "wordpress.com"]

[synthesis]
# 报告生成配置
max_report_length = 8000      # 报告最大长度 (字符)
include_contradictions = true # 是否包含矛盾部分
include_uncertainties = true  # 是否包含不确定部分
min_citations = 3             # 最少引用数

[cache]
# 缓存配置
enabled = true
ttl_hours = 24                # 搜索结果缓存时间
memory_enabled = true         # 是否存入 crew-memory

[hitl]
# Human-in-the-loop 触发条件
on_contradiction = true       # 发现矛盾时
on_low_confidence = true      # 低置信度时
on_sensitive_topic = true     # 敏感话题时
