[meta]
name = "social-story"
display_name = "Social Story"
description = "Vertical 9:16 social media video style optimized for Instagram and TikTok Stories. Bold, attention-grabbing frames designed for mobile-first vertical video."
category = "social"
tags = ["video", "social", "vertical", "story", "instagram", "tiktok"]

[variants]
default = "minimal"

[variants.minimal]
prompt = """
Vertical 9:16 social media story card. Clean minimal design with a soft gradient background (choose from: lilac-to-white, sky blue-to-white, blush-to-cream, sage-to-white). Bold centered typography area at top or bottom third. Plenty of negative space. Modern Instagram aesthetic. Smooth, premium feel. No busy patterns. 1080x1920 pixels.
"""

[variants.bold]
prompt = """
Vertical 9:16 social media story card. High-contrast vibrant design. Bold color blocking: one saturated color occupying top half, contrasting color or white on bottom half. Strong typographic hierarchy implied by layout. Thick geometric shapes or diagonal splits. TikTok-energy aesthetic — eye-catching in the first second. No gradients, pure color fields. 1080x1920 pixels.
"""

[variants.cinematic]
prompt = """
Vertical 9:16 cinematic social story frame. Subtle film grain texture overlay. Moody, editorial photography aesthetic. Dark or desaturated tones with a single accent color. Faint letterbox bars at top and bottom (5% height each). Shallow depth of field implied by soft background blur. Feels like a film still or fashion editorial. 1080x1920 pixels.
"""

# Veo animation prompts — used when anim_style=social-story
# These describe MOTION, not appearance. Keep art style unchanged.

[variants.anim_minimal]
prompt = """
Subtle, elegant animation. Very gentle movements: soft gradient slowly shifting hue, faint light bloom pulsing gently at center, fine particle shimmer rising upward. No text movement. Calm, premium feel. Camera stays still. Keep the original design style throughout.
"""

[variants.anim_bold]
prompt = """
Energetic but controlled animation. Bold color fields rippling slightly at the split line, subtle scanline or glitch flicker lasting 1-2 frames, strong vignette pulse once. High-energy but not chaotic. Camera stays still. Keep the original design style throughout.
"""

[variants.anim_cinematic]
prompt = """
Cinematic slow-motion animation. Faint film grain texture shifting naturally, dust motes drifting in the light, very subtle depth-of-field breathing (rack focus effect). Moody, editorial pace. Camera stays still. Keep the original design style throughout.
"""

[compositing]
still_duration = 1.5
crossfade_dur = 0.8
fade_out_dur = 1.0
music_volume = 0.25
music_fade_in = 1.5
